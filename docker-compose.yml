version: '3.9'
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: killingblow
      POSTGRES_PASSWORD: killingblow
      POSTGRES_DB: killingblow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:
